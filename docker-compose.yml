version: '3.8'

services:
  # ── Production ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: changelog-hub
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Override via .env or docker-compose.override.yml
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      SESSION_SECRET: ${SESSION_SECRET:-changelog-hub-secret-key-change-me-in-production-32c}
      DATA_DIR: /app/data
    volumes:
      # Persist repo config across container restarts
      - changelog_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Development (hot-reload) ─────────────────────────────────
  dev:
    image: node:20-alpine
    container_name: changelog-hub-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      SESSION_SECRET: ${SESSION_SECRET:-changelog-hub-secret-key-change-me-in-production-32c}
      DATA_DIR: ./data
    command: sh -c "npm install && npm run dev"
    profiles: [dev]

volumes:
  changelog_data:
  node_modules_dev:
