version: '3.8'

services:
  # ── Production ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: changelog-hub
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Development (hot-reload) ─────────────────────────────────
  dev:
    image: node:20-alpine
    container_name: changelog-hub-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm install && npm run dev"
    profiles: [dev]

volumes:
  node_modules_dev:
